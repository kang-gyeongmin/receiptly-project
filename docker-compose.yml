version: "3.9"

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: receiptly-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # FastAPI 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: receiptly-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - DB_NAME=receiptly
    depends_on:
      - mongo
    volumes:
      - ./backend:/app   # 개발 중 코드 변경 반영
    restart: unless-stopped

  # Phase 3에서 추가 예정
  # postgres:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_DB: receiptly
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password

  # Phase 4에서 추가 예정
  # airflow:
  #   image: apache/airflow:2.9.0

volumes:
  mongo_data: